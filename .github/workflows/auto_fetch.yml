name: Auto Fetch Odds

on:
  schedule:
    - cron: '0 * * * *'    # každou celou hodinu
    - cron: '30 * * * *'   # každých 30 minut (druhý spuštění v půl)
  workflow_dispatch:        # manual trigger from GitHub UI → Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smart auto-fetch
        run: python scripts/auto_fetch.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TURSO_URL:    ${{ secrets.TURSO_URL }}
          TURSO_TOKEN:  ${{ secrets.TURSO_TOKEN }}
